<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="sgGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="20" fill="rgba(255,255,255,0.02)"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#sg)" stroke-width="2" filter="url(#sgGlow)" opacity="0.3"/>
  <circle cx="100" cy="100" r="46" fill="none" stroke="url(#sg)" stroke-width="1.5" opacity="0.5"/>
  <polygon points="88,76 88,124 126,100" fill="url(#sg)" filter="url(#sgGlow)"/>
  <g opacity="0.4">
    <circle cx="68" cy="68" r="2" fill="#00e5ff"><animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="138" cy="140" r="2" fill="#6366f1"><animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="142" cy="60" r="1.5" fill="#00e5ff"><animate attributeName="opacity" values="0.3;0;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>