<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <radialGradient id="goldShine" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff4b0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
    <filter id="trophyGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" rx="16" fill="none"/>
  <g transform="translate(100,105)">
    <path d="M-25 -40 L-8 35 L8 35 L25 -40 Z" fill="url(#gold)"/>
    <path d="M-25 -40 L-8 35 L8 35 L25 -40 Z" fill="url(#goldShine)"/>
    <ellipse cx="0" cy="-40" rx="28" ry="8" fill="url(#gold)"/>
    <ellipse cx="0" cy="-40" rx="28" ry="8" fill="url(#goldShine)"/>
    <path d="M-25 -25 C-50 -25 -55 5 -8 15" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <path d="M25 -25 C50 -25 55 5 8 15" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <rect x="-18" y="35" width="36" height="6" rx="3" fill="url(#gold)"/>
    <rect x="-28" y="41" width="56" height="5" rx="2.5" fill="url(#gold)"/>
    <polygon points="0,-20 4,-10 14,-10 6,-3 9,7 0,0 -9,7 -6,-3 -14,-10 -4,-10"
             fill="#fff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
</svg>