<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="qg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff00e5"/>
    </linearGradient>
    <filter id="qGlow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="rgba(255,255,255,0.015)"/>
  <g transform="translate(60,55)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#qg)" stroke-width="1.8" filter="url(#qGlow)" opacity="0.6"/>
    <text x="0" y="8" text-anchor="middle" fill="url(#qg)" font-size="24" font-weight="900" font-family="Arial" filter="url(#qGlow)">?</text>
  </g>
  <g opacity="0.3">
    <path d="M30 90 L40 80 L50 88 L60 74" fill="none" stroke="#00e676" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="30" cy="90" r="2" fill="#00e676"/>
    <circle cx="40" cy="80" r="2" fill="#00e676"/>
    <circle cx="50" cy="88" r="2" fill="#00e676"/>
    <circle cx="60" cy="74" r="2" fill="#00e676"/>
  </g>
  <circle cx="86" cy="30" r="1.5" fill="#00e5ff" opacity="0.4"><animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="28" cy="28" r="1.5" fill="#ff00e5" opacity="0.4"><animate attributeName="opacity" values="0.4;0;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
</svg>