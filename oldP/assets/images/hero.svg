<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ff00e5"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" stroke="url(#g1)" stroke-width="3" opacity="0.3"/>
  <circle cx="100" cy="100" r="82" stroke="url(#g1)" stroke-width="1.5" opacity="0.15"/>
  <!-- Question mark -->
  <text x="100" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="96" font-weight="900" fill="url(#g1)">?</text>
  <!-- Sparkle dots -->
  <circle cx="40" cy="45" r="4" fill="#00e5ff" opacity="0.6"/>
  <circle cx="160" cy="50" r="3" fill="#ff00e5" opacity="0.5"/>
  <circle cx="50" cy="155" r="3" fill="#00e676" opacity="0.5"/>
  <circle cx="155" cy="148" r="4" fill="#ff00e5" opacity="0.4"/>
  <!-- Small dots pattern -->
  <circle cx="72" cy="62" r="2" fill="#00e5ff" opacity="0.3"/>
  <circle cx="130" cy="58" r="2" fill="#ff00e5" opacity="0.3"/>
  <circle cx="65" cy="138" r="2" fill="#00e676" opacity="0.3"/>
  <circle cx="138" cy="135" r="2" fill="#00e5ff" opacity="0.3"/>
</svg>
