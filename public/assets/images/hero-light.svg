<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00838f"/>
      <stop offset="100%" stop-color="#ad1457"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" stroke="url(#g1)" stroke-width="3" opacity="0.35"/>
  <circle cx="100" cy="100" r="82" stroke="url(#g1)" stroke-width="1.5" opacity="0.2"/>
  <!-- Question mark -->
  <text x="100" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="96" font-weight="900" fill="url(#g1)">?</text>
  <!-- Sparkle dots -->
  <circle cx="40" cy="45" r="4" fill="#00838f" opacity="0.7"/>
  <circle cx="160" cy="50" r="3" fill="#ad1457" opacity="0.6"/>
  <circle cx="50" cy="155" r="3" fill="#2e7d32" opacity="0.6"/>
  <circle cx="155" cy="148" r="4" fill="#ad1457" opacity="0.5"/>
  <!-- Small dots pattern -->
  <circle cx="72" cy="62" r="2" fill="#00838f" opacity="0.4"/>
  <circle cx="130" cy="58" r="2" fill="#ad1457" opacity="0.4"/>
  <circle cx="65" cy="138" r="2" fill="#2e7d32" opacity="0.4"/>
  <circle cx="138" cy="135" r="2" fill="#00838f" opacity="0.4"/>
</svg>
